# Локальный запуск (без Docker): раздача из папки build и прокси на бэкенд на этом же компьютере.
# Запуск: из корня Parking_lot выполнить npm run build, затем указать этот конфиг при запуске nginx.
# Пример (Windows, nginx в PATH): nginx -p . -c nginx/nginx-local.conf
# Или скопировать в свой nginx conf.d и заменить root на полный путь к build.

server {
    listen 8080;
    server_name localhost;
    root build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
